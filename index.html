<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li class="brand"><img src="logo.png" alt="Spotify" />Spotify</li>
        <li>Home</li>
        <li>About</li>
      </ul>
    </nav>

    <div class="container">
      <div class="songList">
        <h1>Best of 2023 - No Copyright Sounds</h1>
        <div>
            <div class="songItem">
                <img src="cover1.png" alt="1">
                <span>Maaya Gange</span>
                <span class="songlistplay"><span class="timestamp">04:35 <i class="fa-solid fa-play-circle"></i></span></span>
            </div>
            <div class="songItem">
                <img src="cover1.png" alt="1">
                <span>Maaya Gange</span>
                <span class="songlistplay"><span class="timestamp">04:35 <i class="fa-solid fa-play-circle"></i></span></span>
            </div>
            <div class="songItem">
                <img src="cover1.png" alt="1">
                <span>Maaya Gange</span>
                <span class="songlistplay"><span class="timestamp">04:35 <i class="fa-solid fa-play-circle"></i></span></span>
            </div>
        </div>
      </div>
      <div class="songBanner"></div>
    </div>

    <div class="bottom">
      <input type="range" name="range" id="myProgressBar" min="0" value="0" max="100" />
      <div class="icons">
        <i class="fa-solid fa-step-backward fa-2x"></i>
        <i class="fa-solid fa-play-circle fa-2x" id="masterPlay"></i>
        <i class="fa-solid fa-step-forward fa-2x"></i>
      </div>
      <div class="songInfo">
        <img src="playing.gif" width="50px" alt="" id="gif">Maaya Gange
      </div>
    </div>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="script.js"></script>
  </body>
</html>
